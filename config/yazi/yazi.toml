[mgr]
show_hidden = false
sort_by = "natural"
sort_sensitive = false
sort_reverse = false
sort_dir_first = true
linemode = "none"

[preview]
tab_size = 2
max_width = 6000
max_height = 6000
image_filter = "triangle"
image_quality = 75
image_protocol = "kitty"

[opener]
editor = [
  { run = 'nvim "$@"', block = true, for = "unix" },
  { run = 'vim "$@"', block = true, for = "unix" },
]

open = [
  { run = 'xdg-open "$@"', orphan = true, for = "unix" },
]

xopp = [
  { run = 'xournalpp "$@"', orphan = true, for = "unix" },
]

pdf = [
  { run = 'zathura "$@"', orphan = true, for = "unix" },
  { run = 'xdg-open "$@"', orphan = true, for = "unix" },
]

markdown = [
  { run = 'typora "$@"', orphan = true, for = "unix" },
  { run = 'nvim "$@"', block = true, for = "unix" },
]

image = [
  { run = 'xdg-open "$@"', orphan = true, for = "unix" },
]

video = [
  { run = 'mpv "$@"', orphan = true, for = "unix" },
  { run = 'xdg-open "$@"', orphan = true, for = "unix" },
]

audio = [
  { run = 'mpv "$@"', orphan = true, for = "unix" },
  { run = 'xdg-open "$@"', orphan = true, for = "unix" },
]

archive = [
  { run = '7z l "$@" | less', block = true, for = "unix" },
]

[open]
prepend_rules = [
  { url = "*.xopp", use = "xopp" },

  { url = "*.pdf", use = "pdf" },
  { url = "*.djvu", use = "pdf" },
  { url = "*.epub", use = "pdf" },

  { url = "*.md", use = "markdown" },
  { url = "*.tex", use = "editor" },

  { mime = "image/*", use = "image" },
  { mime = "video/*", use = "video" },
  { mime = "audio/*", use = "audio" },

  { url = "*.zip", use = "archive" },
  { url = "*.7z", use = "archive" },
  { url = "*.tar", use = "archive" },
  { url = "*.gz", use = "archive" },

  { mime = "text/*", use = "editor" },
  { url = "*.json", use = "editor" },
  { url = "*.csv", use = "editor" },
]

append_rules = [
  { url = "*", use = "open" },
]
