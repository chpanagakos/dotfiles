backend = "egl";
vsync = true;
# glx-no-stutter = true;

# Shadows
shadow = true;
shadow-radius = 12;
shadow-offset-x = -7;
shadow-offset-y = -7;
shadow-opacity = 0.6;

# Fading (window open/close/focus transitions)
fading = true;
fade-in-step = 0.04;
fade-out-step = 0.04;
fade-delta = 5;

# Rounded corners
corner-radius = 8;

# Opacity (subtle transparency on unfocused windows)
inactive-opacity = 0.92;
active-opacity = 1.0;
frame-opacity = 1.0;

# Blur behind transparent windows (optional, heavier on GPU)
# blur-method = "dual_kawase";
# blur-strength = 3;
